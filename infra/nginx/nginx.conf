worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include      mime.types;
    default_type application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    # HTTP keep-alive — valor padrão; NÃO confundir com proxy_read_timeout
    keepalive_timeout 65s;

    # Mapeamento para o header Connection do WebSocket (RFC 6455)
    # "upgrade" → mantém o upgrade; "" → fecha a conexão normalmente
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Upstreams internos (sem exposição de porta no host) ─────────────────
    upstream api {
        server api:8000;
    }

    upstream frontend {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name _;

        # ── WebSocket — /ws/* ──────────────────────────────────────────────
        # Backend: /ws/alerts (sem prefixo /api/)
        # proxy_pass sem trailing slash → URI encaminhado sem alteração
        # RNF-31: timeouts de 3600 s para conexões longas
        location /ws/ {
            proxy_pass http://api;

            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host             $host;
            proxy_set_header X-Real-IP        $remote_addr;
            proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_read_timeout    3600s;
            proxy_send_timeout    3600s;
        }

        # ── SSE — /api/stream/ ────────────────────────────────────────────────
        # Prefixo mais longo que /api/ → vence no longest-prefix match.
        # Backend: /stream/sensors (prefix="/stream" no stream_router).
        # proxy_pass com trailing slash → nginx remove /api/stream/ e encaminha
        # como /stream/... no FastAPI.
        # RNF-31: timeouts de 3600 s; buffering desativado para streaming imediato.
        location /api/stream/ {
            proxy_pass http://api/stream/;

            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        '';
            proxy_set_header Cache-Control     no-cache;
            proxy_set_header X-Accel-Buffering no;

            proxy_connect_timeout 10s;
            proxy_read_timeout    3600s;
            proxy_send_timeout    3600s;

            chunked_transfer_encoding off;
        }

        # ── FastAPI Docs (acessíveis em /docs e via /api/docs pelo bloco abaixo) ─
        location /docs {
            proxy_pass http://api/docs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /redoc {
            proxy_pass http://api/redoc;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://api/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ── REST API — /api/* ──────────────────────────────────────────────
        # proxy_pass com trailing slash → nginx remove o prefixo /api/ antes de
        # encaminhar. Exemplo: /api/predict/ → /predict/ no FastAPI.
        # Cobre: /predict/, /predictions/, /models/, /health, /api/docs, etc.
        location /api/ {
            proxy_pass http://api/;

            proxy_http_version 1.1;
            proxy_set_header Host             $host;
            proxy_set_header X-Real-IP        $remote_addr;
            proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_read_timeout    3600s;
            proxy_send_timeout    3600s;
        }

        # ── Frontend (Next.js) — catch-all ────────────────────────────────
        # Upgrade/Connection obrigatórios para o WebSocket do HMR (/_next/webpack-hmr)
        # proxy_read_timeout elevado para 180 s: Turbopack compila rotas novas
        # sob demanda no primeiro acesso (dev mode) e pode ultrapassar 60 s em
        # árvores pesadas (Recharts + hooks SSE/WS). Valor anterior causava 504.
        location / {
            proxy_pass http://frontend;

            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host             $host;
            proxy_set_header X-Real-IP        $remote_addr;
            proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_read_timeout    180s;
            proxy_send_timeout    180s;
        }
    }
}
