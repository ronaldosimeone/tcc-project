# Alembic configuration file for PredictIQ backend.
#
# Usage:
#   cd apps/backend
#   alembic upgrade head          # apply all pending migrations
#   alembic downgrade -1          # rollback last migration
#   alembic revision --autogenerate -m "description"  # auto-generate new migration
#
# The DATABASE_URL env var overrides sqlalchemy.url (see alembic/env.py).

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Fallback URL — override with DATABASE_URL env var in production.
sqlalchemy.url = postgresql+asyncpg://user:password@localhost:5432/tcc_db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
