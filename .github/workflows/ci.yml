name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. Job de Verificação de Variáveis de Ambiente
  env-check:
    name: Check Environment Variables
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify .env.example exists
        run: |
          if [ ! -f .env.example ]; then
            echo "Error: .env.example file is missing!"
            exit 1
          fi
          echo ".env.example found."

  # 2. Lint Python (Ruff, Black, Mypy)
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip" # Ativa o cache do pip para acelerar

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black mypy
          # Instala as dependências do backend para o mypy não reclamar de imports
          if [ -f apps/backend/requirements.txt ]; then pip install -r apps/backend/requirements.txt; fi
          if [ -f apps/ml/requirements.txt ]; then pip install -r apps/ml/requirements.txt; fi

      - name: Run Ruff (Linting)
        run: ruff check apps/backend apps/ml

      - name: Run Black (Formatting Check)
        run: black --check apps/backend apps/ml

      - name: Run Mypy (Type Checking)
        run: mypy apps/backend apps/ml --ignore-missing-imports

  # 3. Testes Python (Pytest)
  test-python:
    name: Test Python (Backend & ML)
    runs-on: ubuntu-latest
    needs: lint-python # Só roda se o lint passar
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip pytest httpx
          if [ -f apps/backend/requirements.txt ]; then pip install -r apps/backend/requirements.txt; fi
          if [ -f apps/ml/requirements.txt ]; then pip install -r apps/ml/requirements.txt; fi

      - name: Run Pytest (Backend)
        run: |
          cd apps/backend
          # pytest # Descomente quando criar o test_health.py

      - name: Run Pytest (ML)
        run: |
          cd apps/ml
          # pytest # Descomente quando criar o test_ingest_metropt.py

  # 4. Lint TypeScript (ESLint, Prettier)
  lint-typescript:
    name: Lint TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm" # Ativa o cache do pnpm para acelerar

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: cd apps/frontend && pnpm eslint .

      - name: Run Prettier
        run: cd apps/frontend && pnpm prettier --check .

  # 5. Testes TypeScript (Vitest)
  test-typescript:
    name: Test TypeScript
    runs-on: ubuntu-latest
    needs: lint-typescript # Só roda se o lint passar
    steps:
      - uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Vitest
        run: |
          cd apps/frontend
          pnpm test

  # 6. Testes E2E com Playwright + MSW (RNF-16 / RNF-17)
  test-e2e:
    name: E2E Tests (Playwright + MSW)
    runs-on: ubuntu-latest
    needs: test-typescript # Só roda após os testes unitários passarem
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: apps/frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: |
          cd apps/frontend
          pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: |
          cd apps/frontend
          pnpm exec playwright install chromium --with-deps

      - name: Generate MSW Service Worker
        # Cria public/mockServiceWorker.js que o MswProvider carrega no browser.
        # Deve rodar antes do build/dev server para que o arquivo esteja disponível.
        run: |
          cd apps/frontend
          pnpm e2e:setup

      - name: Run Playwright E2E tests
        run: |
          cd apps/frontend
          pnpm e2e
        env:
          CI: true
          # RNF-13: URL do backend — MSW intercepta esta origem no browser
          NEXT_PUBLIC_API_URL: http://localhost:8000
          # Ativa o MswProvider para os testes E2E
          NEXT_PUBLIC_MSW_ENABLED: "true"

      - name: Upload Playwright report
        if: always() # Faz upload mesmo em caso de falha para facilitar debugging
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/frontend/playwright-report/
          retention-days: 7

      - name: Upload test results (screenshots / traces)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: apps/frontend/e2e-results/
          retention-days: 7